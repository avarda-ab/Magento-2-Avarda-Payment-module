<div class="payment-method" data-bind="css: {'_active': (getCode() == isChecked())}">
    <div class="payment-method-title field choice">
        <input type="radio"
               name="payment[method]"
               class="radio"
               data-bind="attr: {'id': getCode()}, value: getCode(), checked: isChecked, click: selectPaymentMethod, visible: isRadioButtonVisible()">
        <label data-bind="attr: {'for': getCode()}" class="label">
            <!-- ko if: getImageSrc() -->
            <img data-bind="attr: {'src': getImageSrc()}, alt: getTitle()" style="vertical-align: middle;max-width: 100px;max-height: 32px;margin-right: 5px;">
            <!--/ko-->
            <span data-bind="text: getTitle()"></span>
        </label>
    </div>
    <div class="payment-method-content">
        <!-- ko foreach: getRegion('messages') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
        <!--/ko-->
        <div>
            <!-- ko if: getInstructions() -->
            <p data-bind="html: getInstructions()"></p>
            <div style="clear: both"></div>
            <br>
            <!--/ko-->
        </div>
        <!-- ko if: getTermsText() -->
        <div class="field terms_text" style="font-size: smaller;">
            <span data-bind="text: getTermsText()"></span>
            <a data-bind="attr: {'href': getTermsLink()}" target="_blank" rel="noopener">
                (<!-- ko i18n: 'Terms'--><!-- /ko -->)
            </a><br><br>
        </div>
        <!--/ko-->
        <!-- ko if: getLoanWarning() -->
        <div>
            <p data-bind="html: getLoanWarning()"></p>
        </div>
        <!--/ko-->
        <div class="payment-method-billing-address">
            <!-- ko foreach: $parent.getRegion(getBillingAddressFormName()) -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>
        <div class="checkout-agreements-block">
            <!-- ko foreach: $parent.getRegion('before-place-order') -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>
        <div class="actions-toolbar">
            <div class="primary">
                <button class="action primary checkout"
                        type="submit"
                        data-bind="
                            click: placeOrder,
                            attr: {'title': $t('Place Order')},
                            enable: (getCode() == isChecked()),
                            css: {disabled: !isPlaceOrderActionAllowed()}
                            "
                        disabled>
                    <span data-bind="i18n: 'Place Order'"></span>
                </button>
            </div>
        </div>
    </div>
</div>

<div data-bind="attr: {'id': 'avarda-ssn-modal-' + getCode()}" style="display:none">
    <p class="avarda-ssn-description" data-bind="i18n: 'To pay with a credit payment method we need your Social Security Number.'"></p>
    <div class="field field-number required avarda">
        <label class="label" data-bind="attr: {'for': 'avarda_ssn_input_' + getCode()}">
            <span data-bind="i18n: 'Social Security Number'"></span>
        </label>
        <div class="control">
            <input type="text"
                   data-bind="attr: {'id': 'avarda_ssn_input_' + getCode()}"
                   autocomplete="off"
                   class="input-text avarda ssn">
        </div>
    </div>
</div>
